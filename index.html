<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Countdown</title>
  <style>
    :root {
      --bg-color: #191919;       /* Matches Notion dark mode background */
      --card-bg: #222222;
      --text-color: #ffffff;
      --accent-color: #ff5555;   /* Highlight color */
      --muted-color: #888888;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      max-width: 400px;
      width: 100%;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted-color);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 16px;
    }

    .countdown {
      display: flex;
      justify-content: space-around;
      gap: 12px;
      margin-bottom: 12px;
    }

    .time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .number {
      font-size: 2.2rem;
      font-weight: 700;
      color: var(--accent-color);
      line-height: 1;
    }

    .label {
      font-size: 0.75rem;
      color: var(--muted-color);
      margin-top: 6px;
      text-transform: uppercase;
    }

    .target-date {
      font-size: 0.85rem;
      color: var(--muted-color);
      margin-top: 12px;
    }
  </style>
</head>
