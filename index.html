<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exam Countdown</title>
  <style>
    :root {
      --bg-color: #191919;       /* Matches Notion dark mode */
      --card-bg: #222222;
      --text-color: #ffffff;
      --accent-color: #ff5555;   /* Highlight color */
      --muted-color: #888888;
      --input-bg: #2d2d2d;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .container {
      background: var(--card-bg);
      border: 1px solid #333;
      border-radius: 12px;
      padding: 24px 32px;
      text-align: center;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      max-width: 400px;
      width: 100%;
    }

    .title {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--muted-color);
      text-transform: uppercase;
      letter-spacing: 1.5px;
      margin-bottom: 20px;
    }

    .countdown {
      display: flex;
      justify-content: space-around;
      gap: 12px;
      margin-bottom: 24px;
    }

    .time-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      flex: 1;
    }

    .number {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--accent-color);
      line-height: 1;
    }

    .label {
      font-size: 0.75rem;
      color: var(--muted-color);
      margin-top: 6px;
      text-transform: uppercase;
    }

    .controls {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-top: 10px;
      border-top: 1px solid #333;
      padding-top: 16px;
    }

    .input-group {
      display: flex;
      gap: 8px;
    }

    input[type="date"] {
      background: var(--input-bg);
      border: 1px solid #444;
      border-radius: 6px;
      color: var(--text-color);
      padding: 8px 12px;
      font-size: 0.85rem;
      flex: 1;
      outline: none;
      color-scheme: dark;
    }

    button {
      background: var(--accent-color);
      border: none;
      border-radius: 6px;
      color: white;
      padding: 8px 16px;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="title">Exam Countdown</div>
    
    <div class="countdown" id="countdown-display">
      <div class="time-box">
        <span class="number" id="days">00</span>
        <span class="label">Days</span>
      </div>
      <div class="time-box">
        <span class="number" id="hours">00</span>
        <span class="label">Hours</span>
      </div>
      <div class="time-box">
        <span class="number" id="mins">00</span>
        <span class="label">Mins</span>
      </div>
    </div>

    <div class="controls">
      <div class="input-group">
        <input type="date" id="date-input">
        <button onclick="setExamDate()">Set Date</button>
      </div>
    </div>
  </div>

  <script>
    let timer;

    // Load saved date from local storage or set a default future date
    let savedDate = localStorage.getItem("examDate");
    if (!savedDate) {
      const defaultDate = new Date();
      defaultDate.setDate(defaultDate.getDate() + 30);
      savedDate = defaultDate.toISOString().split('T')[0];
    }
    
    document.getElementById("date-input").value = savedDate;
    startCountdown(savedDate);

    function setExamDate() {
      const selectedDate = document.getElementById("date-input").value;
      if (!selectedDate) return;
      
      localStorage.setItem("examDate", selectedDate);
      startCountdown(selectedDate);
    }

    function startCountdown(targetDateStr) {
      if (timer) clearInterval(timer);

      const targetDate = new Date(targetDateStr + "T00:00:00").getTime();

      function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
          clearInterval(timer);
          document.getElementById("countdown-display").innerHTML = "<h3 style='color:var(--accent-color); padding: 10px 0;'>Exam Day Has Arrived!</h3>";
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

        document.getElementById("days").innerText = String(days).padStart(2, '0');
        document.getElementById("hours").innerText = String(hours).padStart(2, '0');
        document.getElementById("mins").innerText = String(minutes).padStart(2, '0');
      }

      updateTimer();
      timer = setInterval(updateTimer, 1000);
    }
  </script>

</body>
</html>
