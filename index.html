<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Study Focus Countdown</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap');

    :root {
      --bg-color: #121316;
      --card-bg: rgba(255, 255, 255, 0.03);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #9ca3af;
      --accent: #a78bfa;         /* Soft aesthetic purple */
      --accent-light: #c4b5fd;
      --accent-glow: rgba(167, 139, 250, 0.15);
      --input-bg: rgba(255, 255, 255, 0.05);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Plus Jakarta Sans', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 20px;
    }

    .card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      backdrop-filter: blur(12px);
      border-radius: 20px;
      padding: 28px 32px;
      text-align: center;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      max-width: 380px;
      width: 100%;
      position: relative;
      overflow: hidden;
    }

    /* Ambient background glow */
    .card::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at center, var(--accent-glow) 0%, transparent 60%);
      pointer-events: none;
      z-index: 0;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-bottom: 24px;
    }

    .badge {
      background: rgba(167, 139, 250, 0.1);
      color: var(--accent);
      border: 1px solid rgba(167, 139, 250, 0.2);
      font-size: 0.75rem;
      font-weight: 600;
      padding: 4px 12px;
      border-radius: 20px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .countdown {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 24px;
    }

    .time-box {
      background: rgba(255, 255, 255, 0.02);
      border: 1px solid rgba(255, 255, 255, 0.05);
      border-radius: 14px;
      padding: 14px 10px;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: transform 0.2s ease;
    }

    .time-box:hover {
      transform: translateY(-2px);
    }

    .number {
      font-size: 2rem;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1;
      letter-spacing: -0.5px;
    }

    .label {
      font-size: 0.68rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }

    .controls {
      display: flex;
      gap: 8px;
      border-top: 1px solid var(--card-border);
      padding-top: 20px;
    }

    input[type="date"] {
      background: var(--input-bg);
      border: 1px solid var(--card-border);
      border-radius: 10px;
      color: var(--text-main);
      padding: 10px 12px;
      font-size: 0.82rem;
      font-weight: 500;
      flex: 1;
      outline: none;
      color-scheme: dark;
      transition: border-color 0.2s;
    }

    input[type="date"]:focus {
      border-color: var(--accent);
    }

    button {
      background: var(--accent);
      border: none;
      border-radius: 10px;
      color: #121316;
      padding: 10px 16px;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    button:hover {
      background: var(--accent-light);
      transform: translateY(-1px);
    }

    button:active {
      transform: translateY(0);
    }
  </style>
</head>
<body>

  <div class="card">
    <div class="content">
      <div class="header">
        <span class="badge">📖 Exam Prep</span>
      </div>
      
      <div class="countdown" id="countdown-display">
        <div class="time-box">
          <span class="number" id="days">00</span>
          <span class="label">Days</span>
        </div>
        <div class="time-box">
          <span class="number" id="hours">00</span>
          <span class="label">Hours</span>
        </div>
        <div class="time-box">
          <span class="number" id="mins">00</span>
          <span class="label">Mins</span>
        </div>
      </div>

      <div class="controls">
        <input type="date" id="date-input">
        <button onclick="setExamDate()">Set Date</button>
      </div>
    </div>
  </div>

  <script>
    let timer;

    // Load saved date from local storage or set default target (30 days ahead)
    let savedDate = localStorage.getItem("examDate");
    if (!savedDate) {
      const defaultDate = new Date();
      defaultDate.setDate(defaultDate.getDate() + 30);
      savedDate = defaultDate.toISOString().split('T')[0];
    }
    
    document.getElementById("date-input").value = savedDate;
    startCountdown(savedDate);

    function setExamDate() {
      const selectedDate = document.getElementById("date-input").value;
      if (!selectedDate) return;
      
      localStorage.setItem("examDate", selectedDate);
      startCountdown(selectedDate);
    }

    function startCountdown(targetDateStr) {
      if (timer) clearInterval(timer);

      const targetDate = new Date(targetDateStr + "T00:00:00").getTime();

      function updateTimer() {
        const now = new Date().getTime();
        const distance = targetDate - now;

        if (distance < 0) {
          clearInterval(timer);
          document.getElementById("countdown-display").innerHTML = "<h3 style='color:var(--accent); font-weight: 600; padding: 8px 0;'>Exam Day! You got this! 🎯</h3>";
          return;
        }

        const days = Math.floor(distance / (1000 * 60 * 60 * 24));
        const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));

        document.getElementById("days").innerText = String(days).padStart(2, '0');
        document.getElementById("hours").innerText = String(hours).padStart(2, '0');
        document.getElementById("mins").innerText = String(minutes).padStart(2, '0');
      }

      updateTimer();
      timer = setInterval(updateTimer, 1000);
    }
  </script>

</body>
</html>
